name: Generate Blog Content

on:
  # 평일 새벽 5:30 KST (UTC 20:30, 일-목 = KST 월-금)
  schedule:
    - cron: '30 20 * * 0-4'

  # 수동 실행 가능
  workflow_dispatch:

concurrency:
  group: generate-blog
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-blog:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Playwright 브라우저 캐시
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Playwright 브라우저 설치
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Playwright 시스템 의존성 설치
        run: npx playwright install-deps chromium

      - name: Google Cloud 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CLOUD_CREDENTIALS }}

      - name: Generate blog content (AI Dynamic Keywords)
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "AI 동적 키워드 5개 생성"
          npx tsx scripts/generate-blog-post.ts
