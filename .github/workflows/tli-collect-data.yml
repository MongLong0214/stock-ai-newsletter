name: TLI Data Collection

on:
  schedule:
    # 매일 02:00 KST = 17:00 UTC (전날)
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  collect-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TLI Data Collection & Scoring
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          BIGKINDS_API_KEY: ${{ secrets.BIGKINDS_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          echo "🔄 Starting TLI data collection..."
          npx tsx scripts/tli/collect-and-score.ts

      - name: Notify on success
        if: success()
        run: echo "✅ TLI data collection completed!"

      - name: Notify on failure
        if: failure()
        run: echo "❌ TLI data collection failed!"
