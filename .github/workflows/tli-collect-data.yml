name: TLI Data Collection

on:
  schedule:
    # 장 마감 후 전체 수집 (평일 KST 16:30 = UTC 07:30)
    - cron: '30 7 * * 1-5'
    # 아침 뉴스 수집 (평일+토 KST 09:00 = UTC 00:00)
    - cron: '0 0 * * 1-6'
    # 주말 전체 수집 (일요일 KST 02:00 = UTC 17:00 토요일)
    - cron: '0 17 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - news-only

# 동시 실행 방지: 진행 중이면 대기 (cancel 대신 queue)
concurrency:
  group: tli-collect
  cancel-in-progress: false

jobs:
  collect-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine run mode
        id: mode
        run: |
          # workflow_dispatch에서 mode 지정 시 사용
          if [ "${{ github.event.inputs.mode }}" != "" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # cron 기반 자동 판별: UTC 00:00 (KST 09:00) = 뉴스만
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "00" ]; then
              echo "mode=news-only" >> $GITHUB_OUTPUT
            else
              echo "mode=full" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run TLI Data Collection & Scoring
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TLI_MODE: ${{ steps.mode.outputs.mode }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          TLI_COMPARISON_V4_SHADOW_ENABLED: 'true'
          # NOTE: SERVING_ENABLED는 파이프라인에서는 미사용 (Vercel 앱 서버에서 별도 설정 필요)
          TLI_COMPARISON_V4_SERVING_ENABLED: 'true'
        run: npx tsx scripts/tli/collect-and-score.ts

      - name: Notify on failure
        if: failure()
        env:
          TLI_MODE: ${{ steps.mode.outputs.mode }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 TLI 파이프라인 실패 (${new Date().toISOString().split('T')[0]})`;
            const rawMode = process.env.TLI_MODE || 'unknown';
            const safeMode = ['full', 'news-only'].includes(rawMode) ? rawMode : 'unknown';
            const body = [
              `## 파이프라인 실패 알림`,
              ``,
              `| 항목 | 값 |`,
              `|------|-----|`,
              `| **실행 모드** | \`${safeMode}\` |`,
              `| **트리거** | \`${context.eventName}\` |`,
              `| **실행 URL** | [링크](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
              `| **시간 (UTC)** | ${new Date().toISOString()} |`,
              ``,
              `> 자동 생성된 이슈입니다. 로그를 확인하고 조치해 주세요.`,
            ].join('\n');

            // 동일 제목의 열린 이슈가 있으면 중복 생성 방지
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
              per_page: 5,
            });
            if (existing.data.some(i => i.title === title)) {
              console.log('동일 이슈가 이미 존재합니다. 생성 생략.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'pipeline-failure'],
            });

