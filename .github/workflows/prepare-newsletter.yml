name: Prepare Stock Newsletter

on:
  schedule:
    # 평일 오전 6:00 KST (UTC 21:00 전날, 월-금요일만)
    - cron: '0 21 * * 0-4'
  workflow_dispatch: # 수동 실행 가능

jobs:
  check-market:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check Korean market day
        id: check
        run: |
          # 수동 실행은 항상 허용
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "🔧 수동 실행 — 휴장일 체크 건너뜀"
            exit 0
          fi

          KST_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          KST_DOW=$(TZ=Asia/Seoul date +%u)
          echo "📅 KST 날짜: $KST_DATE (요일: $KST_DOW)"

          # 주말 체크 (6=토, 7=일) — cron 보완용 안전장치
          if [ "$KST_DOW" -ge 6 ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "🚫 주말 — 건너뜀"
            exit 0
          fi

          # 대한민국 공휴일 + KRX 휴장일 (매년 초 업데이트 필요)
          HOLIDAYS=(
            # — 2025 —
            "2025-01-01"  # 신정
            "2025-01-28" "2025-01-29" "2025-01-30"  # 설날
            "2025-03-03"  # 삼일절 대체공휴일
            "2025-05-01"  # 근로자의 날
            "2025-05-05"  # 어린이날 + 부처님오신날
            "2025-05-06"  # 대체공휴일
            "2025-06-06"  # 현충일
            "2025-08-15"  # 광복절
            "2025-10-03"  # 개천절
            "2025-10-06" "2025-10-07"  # 추석
            "2025-10-08"  # 추석 대체공휴일
            "2025-10-09"  # 한글날
            "2025-12-25"  # 성탄절
            "2025-12-31"  # 연말 휴장
            # — 2026 —
            "2026-01-01"  # 신정
            "2026-02-16" "2026-02-17" "2026-02-18"  # 설날
            "2026-03-02"  # 삼일절 대체공휴일
            "2026-05-01"  # 근로자의 날
            "2026-05-05"  # 어린이날
            "2026-05-25"  # 부처님오신날 대체공휴일
            "2026-06-03"  # 지방선거일
            "2026-07-17"  # 제헌절
            "2026-08-17"  # 광복절 대체공휴일
            "2026-09-24" "2026-09-25"  # 추석
            "2026-09-28"  # 추석 대체공휴일
            "2026-10-05"  # 개천절 대체공휴일
            "2026-10-09"  # 한글날
            "2026-12-25"  # 성탄절
            "2026-12-31"  # 연말 휴장
          )

          for holiday in "${HOLIDAYS[@]}"; do
            if [ "$KST_DATE" = "$holiday" ]; then
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "🚫 공휴일/휴장일 ($KST_DATE) — 건너뜀"
              exit 0
            fi
          done

          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "✅ 개장일 — 실행"

  prepare-newsletter:
    needs: check-market
    if: needs.check-market.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Google Cloud credentials
        run: |
          echo '${{ secrets.GOOGLE_CLOUD_CREDENTIALS }}' > $HOME/gcloud-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-key.json" >> $GITHUB_ENV

      - name: Prepare Newsletter (AI Analysis)
        env:
          # API Keys
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # KIS API - 시장 스냅샷 수집용
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}

          # Google Cloud (Vertex AI) - Gemini 전용
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: us-central1

          # SerpAPI (VIX, USD/KRW, USD/JPY, Event signals)
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}

          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "🚀 Starting AI analysis and content preparation..."
          npx tsx scripts/prepare-newsletter.ts

      - name: Cleanup credentials
        if: always()
        run: rm -f $HOME/gcloud-key.json

      - name: Notify on success
        if: success()
        run: echo "✅ Newsletter content prepared successfully! Ready for 07:25 KST sending."

      - name: Notify on failure
        if: failure()
        run: echo "❌ Newsletter preparation failed!!"
